name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: ${{ matrix.os }} · CMake + Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: macos-latest
            cc: cc
            cxx: c++

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Smoke test
        run: |
          ./build/fakecc examples/return42.c -o /tmp/a.out
          /tmp/a.out
          [ "$?" -eq 42 ]
