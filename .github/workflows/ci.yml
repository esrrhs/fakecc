name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: ${{ matrix.config.label }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - label: ubuntu-latest · gcc
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - label: ubuntu-24.04 · clang
            os: ubuntu-24.04
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
